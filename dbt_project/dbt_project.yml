name: fleet_pulse
version: '1.0.0'

profile: fleet_pulse

model-paths: ["models"]
macro-paths: ["macros"]
clean-targets: ["target", "dbt_packages"]

models:
  fleet_pulse:
    staging:
      +materialized: view
      +schema: fleet-bronze-db
    silver:
      +materialized: table
      +schema: fleet-silver-db
      +file_format: parquet
      +post_hook: >
        INSERT INTO "fleet-silver-db"."dbt_audit_log"
        SELECT
          '{{ this.name }}',
          current_timestamp,
          COUNT(*),
          'SUCCESS'
        FROM "{{ this.schema }}"."{{ this.identifier }}"
    gold:
      +materialized: table
      +schema: fleet-gold-db
      +file_format: parquet
      +post_hook: >
        INSERT INTO "fleet-silver-db"."dbt_audit_log"
        SELECT
          '{{ this.name }}',
          current_timestamp,
          COUNT(*),
          'SUCCESS'
        FROM "{{ this.schema }}"."{{ this.identifier }}"